name: Update profile stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/update-stats.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Compute asset version
        run: echo "ASSET_VERSION=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_ENV"
      - name: Generate SVGs
        env:
          GH_PAT: ${{ secrets.PROFILE_STATS_PAT }}
          GH_USER: w1ck3ds0d4
        run: node scripts/generate-stats.mjs
      - name: Prune old asset versions
        run: |
          for name in banner stats languages streak trophies; do
            keep="assets/${name}.${ASSET_VERSION}.svg"
            for f in assets/${name}.svg assets/${name}.*.svg; do
              [ -f "$f" ] || continue
              if [ "$f" != "$keep" ]; then
                rm -f "$f"
              fi
            done
          done
      - name: Update README and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for name in banner stats languages streak trophies; do
            sed -i -E "s|assets/${name}(\.[A-Za-z0-9]+)?\.svg(\?v=[A-Za-z0-9]+)?|assets/${name}.${ASSET_VERSION}.svg|g" README.md
          done
          git add -A assets/ README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "(chore) refresh profile stats"
            git push
          fi
