name: Update profile stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/update-stats.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate SVGs
        env:
          GH_PAT: ${{ secrets.PROFILE_STATS_PAT }}
          GH_USER: w1ck3ds0d4
        run: node scripts/generate-stats.mjs
      - name: Commit refreshed assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TS=$(date -u +%Y%m%d%H%M)
            for svg in banner stats languages streak trophies; do
              sed -i -E "s|(assets/${svg}\.svg)(\?v=[A-Za-z0-9]+)?|\1?v=${TS}|g" README.md
            done
            git add README.md
            git commit -m "(chore) refresh profile stats"
            git push
          fi
